{% extends 'paintings/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block header_block %}{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">
        <h1>Регистрация</h1>

        <form method="post" class="law-search chat-formA">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="law-btn-primary lol">Зарегистрироваться</button>
        </form>

        <div class="auth-links">
            <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
            <p><a class="law-btn-primary back-btn lol" href="{% url 'index' %}">Продолжить без аккаунта</a></p>
        </div>
    </div>

</div>

{% endblock %}
