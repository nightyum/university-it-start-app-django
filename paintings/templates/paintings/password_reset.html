{% extends 'paintings/base.html' %}

{% block title %}Сброс пароля{% endblock %}
{% block header_block %}{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">
        <h1>Сброс пароля</h1>

        <form method="post" class="law-search chat-formA">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="law-btn-primary lol">
                Отправить код для сброса
            </button>
        </form>

        <div class="auth-links">
            <a class="law-btn-primary back-btn" href="{% url 'login' %}">Вспомнили пароль? </a>
            <a class="law-btn-primary back-btn" href="{% url 'registration' %}">Зарегистрироваться</a>
        </div>
    </div>

</div>

{% endblock %}
